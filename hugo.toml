baseURL = 'https://benj2o.github.io/personal-site/'
locale = 'en-us'
title = 'Benji'
theme = 'PaperMod'

enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  env = 'production'
  author = 'BC'
  description = 'Notes, essays, and projects from a curious mind.'
  defaultTheme = 'light'
  disableThemeToggle = true
  hideFooter = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  DateFormat = 'January 2, 2006'
  mainSections = ['posts']

  [params.homeInfoParams]
    Title = 'Benji'
    Content = 'Essays, notes, and project traces. I write to make thinking inspectable — clear claims, careful structure, durable ideas.'

[taxonomies]
  category = 'categories'
  tag = 'tags'

[menu]
  [[menu.main]]
    identifier = 'writing'
    name = 'Writing'
    url = 'posts/'
    weight = 10
  [[menu.main]]
    identifier = 'notes'
    name = 'Notes'
    url = 'notes/'
    weight = 20
  [[menu.main]]
    identifier = 'portfolio'
    name = 'Portfolio'
    url = 'portfolio/'
    weight = 30
  [[menu.main]]
    identifier = 'reading'
    name = 'Reading'
    url = 'books/'
    weight = 40